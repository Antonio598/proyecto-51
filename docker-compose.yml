# Ejecución local con Docker (alternativa a `npm run dev:*`).
#
# Una sola imagen con backend y frontend. La base de datos y el
# almacenamiento son de Supabase, así que no hay más servicios que levantar.
#
# Uso:  cp .env.example .env  &&  docker compose up -d --build
#       → panel en http://localhost:3000
services:
  crm:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      # Base de datos (Supabase)
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      # Almacenamiento de documentos (Supabase Storage)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET: ${SUPABASE_BUCKET:-documentos}
      # Sesiones
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      # IA
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      # WhatsApp
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-despacho}
      EVOLUTION_WEBHOOK_TOKEN: ${EVOLUTION_WEBHOOK_TOKEN}
      # Cron de cobranza
      N8N_SERVICE_TOKEN: ${N8N_SERVICE_TOKEN}
    networks:
      - crm_net

networks:
  crm_net:
    driver: bridge
